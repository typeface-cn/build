name: CI
on:
  push:
    branches: [ master, releases/** ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    env:
      MSYS2_FC_CACHE_SKIP: true
    strategy:
      matrix:
        arch: ["MINGW32", "MINGW64"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - name: Checkout FontForgeBuilds
        uses: actions/checkout@v4
        with:
          repository: fontforge/fontforgebuilds
          ref: master-local
          path: fontforgebuilds
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.arch }}
          update: true
          install: git
      - name: Run FontForgeBulds initialisation
        working-directory: fontforgebuilds
        shell: msys2 {0}
        run: ./ffbuild.sh --github-actions --depsonly
      - name: Run FontForgeBuilds
        working-directory: fontforgebuilds
        shell: msys2 {0}
        run: |
          ./ffbuild.sh --github-actions
          FFPATH=`cygpath -m "$GITHUB_WORKSPACE/repo"` ./make-portable-package.sh ci
      - name: Run InnoSetup
        if: github.ref == 'refs/heads/master'
        working-directory: fontforgebuilds/fontforge-setup
        run: |
          winget install --id JRSoftware.InnoSetup -e -s winget
          $env:path += ";$env:LOCALAPPDATA/Programs/Inno Setup 6"
          iscc -Qp fontforgesetup.iss -DMSYSTEM=${{ matrix.arch }}
      - name: Build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}
          path: |
            fontforgebuilds/*.7z
            fontforgebuilds/fontforge-setup/*.exe

  # Test Python module build with MSVC toolchain
  # This ensures compatibility with Python.org Windows builds (which use MSVC)
  windows-msvc:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
    steps:
      - uses: actions/checkout@v4
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-files-${{ runner.os }}-
      - name: Create vcpkg cache directory
        run: New-Item -ItemType Directory -Force -Path vcpkg-cache
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure
        run: |
          $pythonExe = (Get-Command python).Source
          Write-Host "Using Python: $pythonExe"
          cmake -B build -G "NMake Makefiles" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPython3_EXECUTABLE="$pythonExe" `
            -DENABLE_GUI=OFF `
            -DENABLE_PYTHON_SCRIPTING=ON `
            -DENABLE_PYTHON_EXTENSION=ON `
            -DENABLE_LIBSPIRO=OFF `
            -DENABLE_WOFF2=OFF `
            -DENABLE_DOCS=OFF `
            -DBUILD_SHARED_LIBS=ON
      - name: Build
        run: cmake --build build
      - name: Run pyhook tests
        run: |
          # Copy DLLs to lib directory so Python can find them
          Copy-Item build\bin\*.dll build\lib\ -Force
          Copy-Item build\vcpkg_installed\x64-windows\bin\*.dll build\lib\ -Force -ErrorAction SilentlyContinue
          ctest --test-dir build -R "_pyhook" --output-on-failure
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
