name: Build FontForge with MSVC for Windows (WITH GUI)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows-msvc-gui:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
    
    steps:
      # 🔥 拉取官方 FontForge 源码
      - name: Checkout FontForge official source
        uses: actions/checkout@v4
        with:
          repository: fontforge/fontforge
          ref: master
          path: fontforge

      # 恢复 vcpkg 缓存
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
          restore-keys: |
            vcpkg-files-${{ runner.os }}-
      
      - name: Create vcpkg cache directory
        run: New-Item -ItemType Directory -Force -Path vcpkg-cache

      # 🔥 配置 vcpkg
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'fontforge/vcpkg.json'

      # 初始化 MSVC x64 环境
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 配置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 🔥 关键修复：设置 pkg-config 和 Gettext 环境变量
      - name: Setup pkg-config and Gettext environment
        run: |
          # 设置 pkg-config
          $pkgConfigExe = "$env:VCPKG_ROOT\installed\x64-windows\tools\pkgconf\pkg-config.exe"
          if (-not (Test-Path $pkgConfigExe)) {
            $pkgConfigExe = "$env:VCPKG_ROOT\vcpkg.exe"
          }
          echo "PKG_CONFIG_EXECUTABLE=$pkgConfigExe" >> $env:GITHUB_ENV
          
          $pkgConfigPath = "$env:VCPKG_ROOT\installed\x64-windows\lib\pkgconfig;$env:VCPKG_ROOT\installed\x64-windows\share\pkgconfig"
          echo "PKG_CONFIG_PATH=$pkgConfigPath" >> $env:GITHUB_ENV
          
          # 🔥 设置 Gettext 工具路径
          $gettextBin = "$env:VCPKG_ROOT\installed\x64-windows\tools\gettext"
          if (Test-Path "$gettextBin\msgmerge.exe") {
            echo "GETTEXT_MSGMERGE_EXECUTABLE=$gettextBin\msgmerge.exe" >> $env:GITHUB_ENV
            echo "GETTEXT_MSGFMT_EXECUTABLE=$gettextBin\msgfmt.exe" >> $env:GITHUB_ENV
            Write-Host "Gettext found at: $gettextBin"
            & "$gettextBin\msgmerge.exe" --version
          } else {
            Write-Host "Gettext not found in tools, trying bin directory..."
            $gettextBin2 = "$env:VCPKG_ROOT\installed\x64-windows\bin"
            if (Test-Path "$gettextBin2\msgmerge.exe") {
              echo "GETTEXT_MSGMERGE_EXECUTABLE=$gettextBin2\msgmerge.exe" >> $env:GITHUB_ENV
              echo "GETTEXT_MSGFMT_EXECUTABLE=$gettextBin2\msgfmt.exe" >> $env:GITHUB_ENV
              Write-Host "Gettext found at: $gettextBin2"
            } else {
              Write-Host "::warning::Gettext executables not found, will try to disable i18n"
            }
          }
          
          # 将 gettext bin 添加到 PATH
          echo "$env:VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH
        shell: pwsh

      # 🔥 CMake 配置
      - name: Configure CMake (WITH GUI)
        run: |
          cd fontforge
          $pythonExe = (Get-Command python).Source
          
          $cmakeArgs = @(
            "-B", "build",
            "-G", "Ninja",
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DPython3_EXECUTABLE=$pythonExe",
            "-DENABLE_GUI=ON",
            "-DENABLE_PYTHON_SCRIPTING=ON",
            "-DENABLE_PYTHON_EXTENSION=ON",
            "-DENABLE_LIBSPIRO=ON",
            "-DENABLE_WOFF2=ON",
            "-DENABLE_DOCS=OFF",
            "-DBUILD_SHARED_LIBS=ON",
            "-DUSE_GTK3=ON"
          )
          
          # 添加 pkg-config 配置
          if ($env:PKG_CONFIG_EXECUTABLE) {
            $cmakeArgs += "-DPKG_CONFIG_EXECUTABLE=$env:PKG_CONFIG_EXECUTABLE"
          }
          
          # 添加 Gettext 配置
          if ($env:GETTEXT_MSGMERGE_EXECUTABLE) {
            $cmakeArgs += "-DGETTEXT_MSGMERGE_EXECUTABLE=$env:GETTEXT_MSGMERGE_EXECUTABLE"
          }
          if ($env:GETTEXT_MSGFMT_EXECUTABLE) {
            $cmakeArgs += "-DGETTEXT_MSGFMT_EXECUTABLE=$env:GETTEXT_MSGFMT_EXECUTABLE"
          }
          
          # 如果 Gettext 不可用，禁用国际化
          if (-not $env:GETTEXT_MSGFMT_EXECUTABLE) {
            Write-Host "::warning::Gettext not available, disabling ENABLE_NLS"
            $cmakeArgs += "-DENABLE_NLS=OFF"
          }
          
          cmake @cmakeArgs
        shell: pwsh

      # 编译 FontForge
      - name: Build FontForge
        run: |
          cd fontforge
          cmake --build build --config Release
        shell: pwsh

      # 运行测试
      - name: Run pyhook tests
        run: |
          cd fontforge
          Copy-Item build\bin\*.dll build\lib\ -Force -ErrorAction SilentlyContinue
          Copy-Item build\vcpkg_installed\x64-windows\bin\*.dll build\lib\ -Force -ErrorAction SilentlyContinue
          ctest --test-dir build -R "_pyhook" --output-on-failure --configure-on-failure
        shell: pwsh
        continue-on-error: true
      
      # 配置嵌入式 Python
      - name: Download and configure embedded Python 3.12.8
        run: |
          cd fontforge
          New-Item -ItemType Directory -Force -Path build/bin/Lib
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip" -OutFile python-embed.zip
          Expand-Archive -Path python-embed.zip -DestinationPath build/bin/Lib -Force
          Remove-Item -Path python-embed.zip -Force
          Move-Item -Path build/bin/Lib/python312.dll -Destination build/bin/ -Force -ErrorAction SilentlyContinue
          Move-Item -Path build/bin/Lib/python312.zip -Destination build/bin/ -Force -ErrorAction SilentlyContinue
          $pypath = "build/bin/Lib/python312._pth"
          if (Test-Path $pypath) {
            (Get-Content $pypath) -replace '^#import site', 'import site' | Set-Content $pypath
          }
        shell: pwsh

      # 复制 GUI 运行时依赖
      - name: Copy GUI runtime dependencies
        run: |
          cd fontforge
          $vcpkgBin = "build\vcpkg_installed\x64-windows\bin"
          $targetBin = "build\bin"
          
          $guiDlls = @(
            "gtk-3-0.dll", "gdk-3-0.dll", "gdk_pixbuf-2.0-0.dll",
            "pango-1.0-0.dll", "pangocairo-1.0-0.dll", "pangowin32-1.0-0.dll",
            "cairo-2.dll", "cairo-gobject-2.dll",
            "glib-2.0-0.dll", "gobject-2.0-0.dll", "gio-2.0-0.dll",
            "gmodule-2.0-0.dll", "gthread-2.0-0.dll", "intl.dll",
            "libffi-8.dll", "libpng16-16.dll", "libjpeg-8.dll",
            "libtiff-5.dll", "libwebp-7.dll", "freetype-6.dll",
            "fontconfig-1.dll", "expat.dll", "zlib1.dll",
            "libiconv-2.dll", "libxml2-2.dll", "libxslt-1.dll"
          )
          
          foreach ($dll in $guiDlls) {
            Get-Item "$vcpkgBin\$dll" -ErrorAction SilentlyContinue | Copy-Item -Destination "$targetBin\" -Force
          }
          
          Copy-Item "$vcpkgBin\..\share\themes\*" -Destination "$targetBin\share\themes\" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "$vcpkgBin\..\share\icons\*" -Destination "$targetBin\share\icons\" -Recurse -Force -ErrorAction SilentlyContinue
          
          New-Item -ItemType Directory -Force -Path "$targetBin\etc\gtk-3.0"
          @"
          [Settings]
          gtk-theme-name=win32
          gtk-icon-theme-name=Adwaita
          gtk-font-name=Segoe UI 9
          "@ | Out-File -FilePath "$targetBin\etc\gtk-3.0\settings.ini" -Encoding UTF8
        shell: pwsh

      # 创建启动脚本
      - name: Create launch script
        run: |
          cd fontforge/build/bin
          @"
          @echo off
          setlocal
          set FONTFORGE_HOME=%~dp0
          set PATH=%FONTFORGE_HOME%;%PATH%
          set PYTHONHOME=%FONTFORGE_HOME%
          set PYTHONPATH=%FONTFORGE_HOME%Lib
          "%FONTFORGE_HOME%fontforge.exe" %*
          "@ | Out-File -FilePath "fontforge-launcher.bat" -Encoding ASCII
        shell: pwsh

      # 上传构建产物
      - name: Upload FontForge Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FontForge-Windows-MSVC-GUI-Build
          path: |
            fontforge/build/bin/
            fontforge/build/share/
            fontforge/build/etc/
          if-no-files-found: error
          retention-days: 30

      # 保存缓存
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
