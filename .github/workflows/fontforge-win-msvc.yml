name: Build FontForge with MSVC for Windows (WITH GUI + NLS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows-msvc-gui:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
    
    steps:
      - name: Checkout FontForge official source
        uses: actions/checkout@v4
        with:
          repository: fontforge/fontforge
          ref: master
          path: fontforge

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
          restore-keys: |
            vcpkg-files-${{ runner.os }}-
      
      - name: Create vcpkg cache directory
        run: New-Item -ItemType Directory -Force -Path vcpkg-cache

      - name: Setup vcpkg manually
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics
          
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
          "VCPKG_DEFAULT_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
        shell: pwsh

      - name: Install Gettext tools from MSYS2
        run: |
          & "C:\msys64\usr\bin\bash.exe" -lc "pacman -S --noconfirm mingw-w64-x86_64-gettext"
          "GETTEXT_MSGMERGE_EXECUTABLE=C:\msys64\mingw64\bin\msgmerge.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
          "GETTEXT_MSGFMT_EXECUTABLE=C:\msys64\mingw64\bin\msgfmt.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
        shell: pwsh

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get Python executable path
        run: |
          $pythonExe = (Get-Command python).Source
          "PYTHON_EXECUTABLE=$pythonExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
        shell: pwsh

      # 🔥 安装所有依赖（使用 manifest 模式）
      - name: Install vcpkg dependencies
        run: |
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          $installRoot = "$env:GITHUB_WORKSPACE\fontforge\build\vcpkg_installed"
          $fontforgeDir = "$env:GITHUB_WORKSPACE\fontforge"
          
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          
          Write-Host "=== Installing pkgconf first ==="
          Write-Host "VCPKG_ROOT: $vcpkgRoot"
          Write-Host "INSTALL_ROOT: $installRoot"
          
          & "$vcpkgRoot\vcpkg.exe" install pkgconf:x64-windows `
            --x-install-root="$installRoot" `
            --binarysource="files,$env:GITHUB_WORKSPACE\vcpkg-cache,readwrite"
          
          Write-Host "`n=== Installing FontForge dependencies (manifest mode) ==="
          # 🔥 使用 manifest 模式：在 fontforge 目录运行，自动读取 vcpkg.json
          & "$vcpkgRoot\vcpkg.exe" install `
            --x-install-root="$installRoot" `
            --binarysource="files,$env:GITHUB_WORKSPACE\vcpkg-cache,readwrite" `
            --x-manifest-root="$fontforgeDir"
          
          Write-Host "`n=== Verifying pkgconf installation ==="
          $pkgconfDir = "$installRoot\x64-windows\tools\pkgconf"
          Write-Host "Checking directory: $pkgconfDir"
          
          if (Test-Path $pkgconfDir) {
            Write-Host "Directory exists. Contents:"
            Get-ChildItem -Path $pkgconfDir | ForEach-Object { Write-Host "  $($_.Name)" }
          } else {
            Write-Host "Directory does NOT exist!"
          }
          
          $pkgExe = "$pkgconfDir\pkgconf.exe"
          if (Test-Path $pkgExe) {
            Write-Host "✓ pkgconf.exe found: $pkgExe"
            $pkgExe | Out-File -FilePath "$env:GITHUB_WORKSPACE\pkgconf-path.txt" -Encoding UTF8
          } else {
            Write-Host "::error::pkgconf.exe NOT FOUND at: $pkgExe"
            exit 1
          }
        shell: pwsh

      # 🔥 CMake 配置
      - name: Configure CMake
        run: |
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          $installRoot = "$env:GITHUB_WORKSPACE\fontforge\build\vcpkg_installed"
          $x64Dir = "$installRoot\x64-windows"
          
          # 读取之前保存的 pkgconf 路径
          $pkgConfigExe = Get-Content "$env:GITHUB_WORKSPACE\pkgconf-path.txt"
          
          Write-Host "=== Configuration ==="
          Write-Host "VCPKG_ROOT: $vcpkgRoot"
          Write-Host "PKG_CONFIG_EXECUTABLE: $pkgConfigExe"
          Write-Host "GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE"
          
          # 验证
          if (-not (Test-Path $pkgConfigExe)) {
            Write-Host "::error::pkg-config not found at: $pkgConfigExe"
            exit 1
          }
          
          Write-Host "✓ pkg-config verified"
          & $pkgConfigExe --version
          
          $pythonExe = $env:PYTHON_EXECUTABLE
          
          cmake -B fontforge/build `
            -G "Ninja" `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPython3_EXECUTABLE="$pythonExe" `
            -DENABLE_GUI=ON `
            -DENABLE_PYTHON_SCRIPTING=ON `
            -DENABLE_PYTHON_EXTENSION=ON `
            -DENABLE_LIBSPIRO=ON `
            -DENABLE_WOFF2=ON `
            -DENABLE_DOCS=OFF `
            -DENABLE_NLS=ON `
            -DBUILD_SHARED_LIBS=ON `
            -DUSE_GTK3=ON `
            -DPKG_CONFIG_EXECUTABLE="$pkgConfigExe" `
            -DPKG_CONFIG_PATH="$x64Dir\lib\pkgconfig;$x64Dir\share\pkgconfig" `
            -DGETTEXT_MSGMERGE_EXECUTABLE="$env:GETTEXT_MSGMERGE_EXECUTABLE" `
            -DGETTEXT_MSGFMT_EXECUTABLE="$env:GETTEXT_MSGFMT_EXECUTABLE" `
            -DVCPKG_INSTALLED_DIR="$installRoot"
        shell: pwsh

      - name: Build FontForge
        run: cmake --build fontforge/build --config Release
        shell: pwsh

      - name: Upload FontForge Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FontForge-Windows-MSVC-GUI-NLS-Build
          path: |
            fontforge/build/bin/
            fontforge/build/share/
          if-no-files-found: error
          retention-days: 30

      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
