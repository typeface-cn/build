name: Build FontForge (Manifest Mode + MSVC)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows-msvc-gui:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
    
    steps:
      - name: Checkout FontForge
        uses: actions/checkout@v4
        with:
          repository: fontforge/fontforge
          ref: master
          path: fontforge

      - name: Restore vcpkg cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
          restore-keys: |
            vcpkg-files-${{ runner.os }}-

      - name: Create cache dir
        run: New-Item -ItemType Directory -Force -Path vcpkg-cache

      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics
          
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install Gettext (MSYS2)
        run: |
          & "C:\msys64\usr\bin\bash.exe" -lc "pacman -S --noconfirm mingw-w64-x86_64-gettext"
          echo "GETTEXT_MSGMERGE_EXECUTABLE=C:\msys64\mingw64\bin\msgmerge.exe" >> $env:GITHUB_ENV
          echo "GETTEXT_MSGFMT_EXECUTABLE=C:\msys64\mingw64\bin\msgfmt.exe" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 🔥 关键步骤：Patch vcpkg.json 添加 pkgconf 依赖
      - name: Patch vcpkg.json to add pkgconf
        run: |
          $vcpkgJson = "$env:GITHUB_WORKSPACE\fontforge\vcpkg.json"
          
          Write-Host "=== Original vcpkg.json ==="
          Get-Content $vcpkgJson | Write-Host
          
          $json = Get-Content $vcpkgJson -Raw | ConvertFrom-Json
          
          # 检查 dependencies 是否存在
          if (-not $json.dependencies) {
            $json | Add-Member -MemberType NoteProperty -Name "dependencies" -Value @()
          }
          
          # 检查 pkgconf 是否已存在
          $hasPkgconf = $json.dependencies -contains "pkgconf" -or 
                        $json.dependencies -contains "pkg-config"
          
          if (-not $hasPkgconf) {
            Write-Host "`n=== Adding pkgconf to dependencies ==="
            $json.dependencies += "pkgconf"
            
            # 保存修改
            $json | ConvertTo-Json -Depth 10 | Out-File -FilePath $vcpkgJson -Encoding UTF8
            
            Write-Host "`n=== Modified vcpkg.json ==="
            Get-Content $vcpkgJson | Write-Host
          } else {
            Write-Host "`n✓ pkgconf already in dependencies"
          }
        shell: pwsh

      # 🔥 Manifest Mode 安装依赖
      - name: Install dependencies (Manifest Mode)
        run: |
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          $fontforgeDir = "$env:GITHUB_WORKSPACE\fontforge"
          $installRoot = "$fontforgeDir\build\vcpkg_installed"
          
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          
          Write-Host "=== Installing via Manifest Mode ==="
          & "$vcpkgRoot\vcpkg.exe" install `
            --x-manifest-root="$fontforgeDir" `
            --x-install-root="$installRoot" `
            --binarysource="files,$env:GITHUB_WORKSPACE\vcpkg-cache,readwrite"
          
          Write-Host "`n=== Verifying pkgconf installation ==="
          $pkgconfExe = "$installRoot\x64-windows\tools\pkgconf\pkgconf.exe"
          
          if (Test-Path $pkgconfExe) {
            Write-Host "✓ pkgconf.exe found: $pkgconfExe"
            $pkgconfExe | Out-File -FilePath "$env:GITHUB_WORKSPACE\pkgconf_path.txt" -Encoding UTF8
          } else {
            # 递归查找
            $found = Get-ChildItem -Path "$installRoot" -Recurse -Filter "pkgconf.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              Write-Host "✓ pkgconf.exe found (recursive): $($found.FullName)"
              $found.FullName | Out-File -FilePath "$env:GITHUB_WORKSPACE\pkgconf_path.txt" -Encoding UTF8
            } else {
              Write-Host "::error::pkgconf.exe NOT FOUND!"
              exit 1
            }
          }
          
          # 保存路径变量
          $installedDir = "$installRoot\x64-windows"
          $pkgconfDir = Split-Path (Get-Content "$env:GITHUB_WORKSPACE\pkgconf_path.txt") -Parent
          $binDir = "$installedDir\bin"
          $pcPath = "$installedDir\lib\pkgconfig;$installedDir\share\pkgconfig"
          
          $pkgconfDir | Out-File -FilePath "$env:GITHUB_WORKSPACE\pkgconf_dir.txt" -Encoding UTF8
          $binDir | Out-File -FilePath "$env:GITHUB_WORKSPACE\bin_dir.txt" -Encoding UTF8
          $pcPath | Out-File -FilePath "$env:GITHUB_WORKSPACE\pkgconfig_path.txt" -Encoding UTF8
          
          Write-Host "`nPKG_CONFIG_PATH: $pcPath"
        shell: pwsh

      # 🔥 CMake 配置
      - name: Configure CMake
        run: |
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          $fontforgeDir = "$env:GITHUB_WORKSPACE\fontforge"
          $buildDir = "$fontforgeDir\build"
          $pythonExe = (Get-Command python).Source
          
          $pkgconfExe = Get-Content "$env:GITHUB_WORKSPACE\pkgconf_path.txt"
          $pkgconfDir = Get-Content "$env:GITHUB_WORKSPACE\pkgconf_dir.txt"
          $binDir = Get-Content "$env:GITHUB_WORKSPACE\bin_dir.txt"
          $pcPath = Get-Content "$env:GITHUB_WORKSPACE\pkgconfig_path.txt"
          
          Write-Host "=== Configuration ==="
          Write-Host "VCPKG_ROOT: $vcpkgRoot"
          Write-Host "PKG_CONFIG_EXECUTABLE: $pkgconfExe"
          Write-Host "PKG_CONFIG_PATH: $pcPath"
          
          # 🔥 关键：设置 PATH 包含 pkgconf 目录和 bin 目录
          $env:PATH = "$pkgconfDir;$binDir;$env:PATH"
          
          # 验证 pkgconf 可执行
          Write-Host "`n=== Testing pkgconf ==="
          & $pkgconfExe --version
          
          cmake -S "$fontforgeDir" -B "$buildDir" `
            -G "Ninja" `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPython3_EXECUTABLE="$pythonExe" `
            -DENABLE_GUI=ON `
            -DENABLE_PYTHON_SCRIPTING=ON `
            -DENABLE_PYTHON_EXTENSION=ON `
            -DENABLE_LIBSPIRO=ON `
            -DENABLE_WOFF2=ON `
            -DENABLE_DOCS=OFF `
            -DENABLE_NLS=ON `
            -DBUILD_SHARED_LIBS=ON `
            -DUSE_GTK3=ON `
            -DPKG_CONFIG_EXECUTABLE="$pkgconfExe" `
            -DPKG_CONFIG_PATH="$pcPath" `
            -DGETTEXT_MSGMERGE_EXECUTABLE="$env:GETTEXT_MSGMERGE_EXECUTABLE" `
            -DGETTEXT_MSGFMT_EXECUTABLE="$env:GETTEXT_MSGFMT_EXECUTABLE" `
            -DVCPKG_INSTALLED_DIR="$fontforgeDir\build\vcpkg_installed"
        shell: pwsh

      - name: Build FontForge
        run: |
          $pkgconfDir = Get-Content "$env:GITHUB_WORKSPACE\pkgconf_dir.txt"
          $binDir = Get-Content "$env:GITHUB_WORKSPACE\bin_dir.txt"
          $env:PATH = "$pkgconfDir;$binDir;$env:PATH"
          
          cmake --build fontforge/build --config Release
        shell: pwsh
        working-directory: .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FontForge-Windows-MSVC-Manifest
          path: |
            fontforge/build/bin/
            fontforge/build/share/
          if-no-files-found: error
          retention-days: 30

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
