name: Build FontForge with MSVC for Windows (WITH GUI + NLS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows-msvc-gui:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
    
    steps:
      # 🔥 拉取官方 FontForge 源码
      - name: Checkout FontForge official source
        uses: actions/checkout@v4
        with:
          repository: fontforge/fontforge
          ref: master
          path: fontforge

      # 恢复 vcpkg 缓存
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
          restore-keys: |
            vcpkg-files-${{ runner.os }}-
      
      - name: Create vcpkg cache directory
        run: New-Item -ItemType Directory -Force -Path vcpkg-cache

      # 🔥 手动克隆 vcpkg (完整历史)
      - name: Setup vcpkg manually
        run: |
          Write-Host "Cloning vcpkg with full history..."
          git clone https://github.com/microsoft/vcpkg.git
          
          cd vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics
          
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          Write-Host "VCPKG_ROOT: $vcpkgRoot"
          
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
          "VCPKG_DEFAULT_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
          "$vcpkgRoot" | Out-File -FilePath $env:GITHUB_PATH -Encoding UTF8 -Append
        shell: pwsh

      # 🔥 预先安装关键依赖 (在 CMake 配置之前)
      - name: Pre-install critical vcpkg dependencies
        run: |
          Write-Host "=== Pre-installing critical dependencies ==="
          Write-Host "VCPKG_ROOT: $env:VCPKG_ROOT"
          
          # 确保 VCPKG_ROOT 正确
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          if (-not $env:VCPKG_ROOT -or $env:VCPKG_ROOT -like "C:\Program Files\*") {
            $env:VCPKG_ROOT = $vcpkgRoot
          }
          
          # 进入 fontforge 目录 (包含 vcpkg.json manifest)
          cd fontforge
          
          # 创建安装目录
          $installRoot = "$env:GITHUB_WORKSPACE\fontforge\build\vcpkg_installed"
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          
          # 使用 manifest 模式安装依赖 (自动读取当前目录的 vcpkg.json)
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            --triplet x64-windows `
            --x-install-root="$installRoot" `
            --binarysource="files,$env:GITHUB_WORKSPACE\vcpkg-cache,readwrite"
          
          Write-Host "=== Dependencies installed ==="
          
          # 验证安装
          if (Test-Path "$installRoot\x64-windows\tools\pkgconf\pkg-config.exe") {
            Write-Host "✓ pkg-config installed successfully"
          } else {
            Write-Host "::warning::pkg-config may not be installed"
          }
        shell: pwsh

      # 🔥 设置 pkg-config 环境变量 (在 CMake 配置之前)
      - name: Setup pkg-config environment
        run: |
          Write-Host "=== Setting up pkg-config ==="
          
          $vcpkgInstalled = "$env:GITHUB_WORKSPACE\fontforge\build\vcpkg_installed\x64-windows"
          
          Write-Host "Looking for vcpkg_installed at: $vcpkgInstalled"
          
          if (-not (Test-Path $vcpkgInstalled)) {
            Write-Host "::error::vcpkg_installed not found!"
            exit 1
          }
          
          # 查找 pkg-config
          $pkgConfigExe = "$vcpkgInstalled\tools\pkgconf\pkg-config.exe"
          
          if (-not (Test-Path $pkgConfigExe)) {
            Write-Host "::warning::pkg-config not found at expected location, searching..."
            $searchResult = Get-ChildItem -Path "$vcpkgInstalled" -Recurse -Filter "pkg-config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($searchResult) {
              $pkgConfigExe = $searchResult.FullName
              Write-Host "Found pkg-config at: $pkgConfigExe"
            } else {
              Write-Host "::error::pkg-config not found!"
              exit 1
            }
          }
          
          "PKG_CONFIG_EXECUTABLE=$pkgConfigExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
          
          # 设置 PKG_CONFIG_PATH
          $pkgConfigPath = "$vcpkgInstalled\lib\pkgconfig;$vcpkgInstalled\share\pkgconfig"
          "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
          
          # 将 pkgconf 目录添加到 PATH
          $pkgConfigDir = Split-Path $pkgConfigExe -Parent
          $pkgConfigDir | Out-File -FilePath $env:GITHUB_PATH -Encoding UTF8 -Append
          
          Write-Host "PKG_CONFIG_EXECUTABLE: $pkgConfigExe"
          Write-Host "PKG_CONFIG_PATH: $pkgConfigPath"
        shell: pwsh

      # 🔥 从 MSYS2 安装 Gettext 工具
      - name: Install Gettext tools from MSYS2
        run: |
          Write-Host "Installing gettext tools from MSYS2..."
          & "C:\msys64\usr\bin\bash.exe" -lc "pacman -S --noconfirm mingw-w64-x86_64-gettext"
          
          "GETTEXT_MSGMERGE_EXECUTABLE=C:\msys64\mingw64\bin\msgmerge.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
          "GETTEXT_MSGFMT_EXECUTABLE=C:\msys64\mingw64\bin\msgfmt.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding UTF8 -Append
        shell: pwsh

      # 初始化 MSVC x64 环境
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 配置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 🔥 获取 Python 路径
      - name: Get Python executable path
        run: |
          $pythonExe = (Get-Command python).Source
          Write-Host "Python executable: $pythonExe"
          "PYTHON_EXECUTABLE=$pythonExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
        shell: pwsh

      # 🔥 CMake 配置 (依赖已预先安装)
      - name: Configure CMake
        run: |
          cd fontforge
          
          # 确保 VCPKG_ROOT 正确
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          if (-not $env:VCPKG_ROOT -or $env:VCPKG_ROOT -like "C:\Program Files\*") {
            $env:VCPKG_ROOT = $vcpkgRoot
          }
          
          $vcpkgInstalled = "$env:GITHUB_WORKSPACE\fontforge\build\vcpkg_installed"
          
          Write-Host "=== Configuration ==="
          Write-Host "VCPKG_ROOT: $env:VCPKG_ROOT"
          Write-Host "VCPKG_INSTALLED_DIR: $vcpkgInstalled"
          Write-Host "PKG_CONFIG_EXECUTABLE: $env:PKG_CONFIG_EXECUTABLE"
          Write-Host "PYTHON_EXECUTABLE: $env:PYTHON_EXECUTABLE"
          
          # 验证所有工具
          $checks = @{
            "VCPKG_ROOT" = $env:VCPKG_ROOT
            "vcpkg toolchain" = "$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"
            "Python" = $env:PYTHON_EXECUTABLE
            "msgmerge" = $env:GETTEXT_MSGMERGE_EXECUTABLE
            "msgfmt" = $env:GETTEXT_MSGFMT_EXECUTABLE
            "pkg-config" = $env:PKG_CONFIG_EXECUTABLE
          }
          
          foreach ($check in $checks.GetEnumerator()) {
            if (-not (Test-Path $check.Value)) {
              Write-Host "::error::$($check.Key) not found: $($check.Value)"
              exit 1
            }
            Write-Host "✓ $($check.Key): $($check.Value)"
          }
          
          cmake -B build `
            -G "Ninja" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPython3_EXECUTABLE="$env:PYTHON_EXECUTABLE" `
            -DENABLE_GUI=ON `
            -DENABLE_PYTHON_SCRIPTING=ON `
            -DENABLE_PYTHON_EXTENSION=ON `
            -DENABLE_LIBSPIRO=ON `
            -DENABLE_WOFF2=ON `
            -DENABLE_DOCS=OFF `
            -DENABLE_NLS=ON `
            -DBUILD_SHARED_LIBS=ON `
            -DUSE_GTK3=ON `
            -DPKG_CONFIG_EXECUTABLE="$env:PKG_CONFIG_EXECUTABLE" `
            -DGETTEXT_MSGMERGE_EXECUTABLE="$env:GETTEXT_MSGMERGE_EXECUTABLE" `
            -DGETTEXT_MSGFMT_EXECUTABLE="$env:GETTEXT_MSGFMT_EXECUTABLE" `
            -DVCPKG_INSTALLED_DIR="$vcpkgInstalled"
        shell: pwsh

      # 编译
      - name: Build FontForge
        run: |
          cd fontforge
          cmake --build build --config Release
        shell: pwsh

      # 测试
      - name: Run pyhook tests
        run: |
          cd fontforge
          Copy-Item build\bin\*.dll build\lib\ -Force -ErrorAction SilentlyContinue
          Copy-Item build\vcpkg_installed\x64-windows\bin\*.dll build\lib\ -Force -ErrorAction SilentlyContinue
          ctest --test-dir build -R "_pyhook" --output-on-failure --configure-on-failure
        shell: pwsh
        continue-on-error: true
      
      # 嵌入式 Python
      - name: Configure embedded Python 3.12.8
        run: |
          cd fontforge
          New-Item -ItemType Directory -Force -Path build/bin/Lib
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip" -OutFile python-embed.zip
          Expand-Archive -Path python-embed.zip -DestinationPath build/bin/Lib -Force
          Remove-Item -Path python-embed.zip -Force
          Move-Item -Path build/bin/Lib/python312.dll -Destination build/bin/ -Force -ErrorAction SilentlyContinue
          Move-Item -Path build/bin/Lib/python312.zip -Destination build/bin/ -Force -ErrorAction SilentlyContinue
          $pypath = "build/bin/Lib/python312._pth"
          if (Test-Path $pypath) {
            (Get-Content $pypath) -replace '^#import site', 'import site' | Set-Content $pypath
          }
        shell: pwsh

      # 复制 GUI 依赖
      - name: Copy GUI runtime dependencies
        run: |
          cd fontforge
          $vcpkgBin = "build\vcpkg_installed\x64-windows\bin"
          $targetBin = "build\bin"
          
          $guiDlls = @(
            "gtk-3-0.dll", "gdk-3-0.dll", "gdk_pixbuf-2.0-0.dll",
            "pango-1.0-0.dll", "pangocairo-1.0-0.dll", "pangowin32-1.0-0.dll",
            "cairo-2.dll", "cairo-gobject-2.dll",
            "glib-2.0-0.dll", "gobject-2.0-0.dll", "gio-2.0-0.dll",
            "gmodule-2.0-0.dll", "gthread-2.0-0.dll", "intl.dll",
            "libffi-8.dll", "libpng16-16.dll", "libjpeg-8.dll",
            "libtiff-5.dll", "libwebp-7.dll", "freetype-6.dll",
            "fontconfig-1.dll", "expat.dll", "zlib1.dll",
            "libiconv-2.dll", "libxml2-2.dll", "libxslt-1.dll"
          )
          
          foreach ($dll in $guiDlls) {
            Get-Item "$vcpkgBin\$dll" -ErrorAction SilentlyContinue | Copy-Item -Destination "$targetBin\" -Force
          }
          
          Copy-Item "$vcpkgBin\..\share\themes\*" -Destination "$targetBin\share\themes\" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "$vcpkgBin\..\share\icons\*" -Destination "$targetBin\share\icons\" -Recurse -Force -ErrorAction SilentlyContinue
          
          New-Item -ItemType Directory -Force -Path "$targetBin\etc\gtk-3.0"
          @"
          [Settings]
          gtk-theme-name=win32
          gtk-icon-theme-name=Adwaita
          gtk-font-name=Segoe UI 9
          "@ | Out-File -FilePath "$targetBin\etc\gtk-3.0\settings.ini" -Encoding UTF8
        shell: pwsh

      # 启动脚本
      - name: Create launch script
        run: |
          cd fontforge/build/bin
          @"
          @echo off
          setlocal
          set FONTFORGE_HOME=%~dp0
          set PATH=%FONTFORGE_HOME%;%PATH%
          set PYTHONHOME=%FONTFORGE_HOME%
          set PYTHONPATH=%FONTFORGE_HOME%Lib
          "%FONTFORGE_HOME%fontforge.exe" %*
          "@ | Out-File -FilePath "fontforge-launcher.bat" -Encoding ASCII
        shell: pwsh

      # 上传产物
      - name: Upload FontForge Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FontForge-Windows-MSVC-GUI-NLS-Build
          path: |
            fontforge/build/bin/
            fontforge/build/share/
            fontforge/build/etc/
          if-no-files-found: error
          retention-days: 30

      # 保存缓存
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
