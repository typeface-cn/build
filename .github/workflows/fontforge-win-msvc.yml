name: Build FontForge with MSVC for Windows
on:
  push:
    branches: [ master, releases/** ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  windows-msvc:
    runs-on: windows-latest
    env:
      # 配置 vcpkg 二进制缓存源（关键优化）
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 恢复 vcpkg 缓存（修复路径拼写错误）
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg-cache
          # 修正：fontforg → fontforge，正确的 vcpkg.json 路径
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
          restore-keys: |
            vcpkg-files-${{ runner.os }}-

      # 创建缓存目录（幂等操作，避免目录不存在报错）
      - name: Create vcpkg cache directory
        run: New-Item -ItemType Directory -Force -Path vcpkg-cache

      # 配置 vcpkg（修复路径错误）
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'fontforge/vcpkg.json'

      # 初始化 MSVC 编译环境（x64 架构）
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 配置 Python 环境
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # CMake 配置（NMake Makefiles + vcpkg 工具链）
      - name: Configure CMake project
        run: |
          $pythonExe = (Get-Command python).Source
          Write-Host "Using Python executable: $pythonExe"
          
          cmake -B build -G "NMake Makefiles" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPython3_EXECUTABLE="$pythonExe" `
            -DENABLE_GUI=OFF `
            -DENABLE_PYTHON_SCRIPTING=ON `
            -DENABLE_PYTHON_EXTENSION=ON `
            -DENABLE_LIBSPIRO=OFF `
            -DENABLE_WOFF2=OFF `
            -DENABLE_DOCS=OFF `
            -DBUILD_SHARED_LIBS=ON

      # 编译项目
      - name: Build FontForge
        run: cmake --build build

      # 运行 Python 钩子测试（补全依赖 DLL，避免加载失败）
      - name: Run pyhook tests
        run: |
          # 复制编译产物 DLL 到 Python 模块目录
          Copy-Item -Path build\bin\*.dll -Destination build\lib\ -Force
          # 复制 vcpkg 依赖的系统 DLL（容错：忽略文件不存在的错误）
          Copy-Item -Path build\vcpkg_installed\x64-windows\bin\*.dll -Destination build\lib\ -Force -ErrorAction SilentlyContinue
          # 运行测试
          ctest --test-dir build -R "_pyhook" --output-on-failure

      # 保存 vcpkg 缓存（无论编译成功/失败都保存，加速下次构建）
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
