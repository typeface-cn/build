name: Build FontForge (Manifest Mode + MSVC)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows-msvc-gui:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
    
    steps:
      - name: Checkout FontForge
        uses: actions/checkout@v4
        with:
          repository: fontforge/fontforge
          ref: master
          path: fontforge

      - name: Restore vcpkg cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
          restore-keys: |
            vcpkg-files-${{ runner.os }}-

      - name: Create cache dir
        run: New-Item -ItemType Directory -Force -Path vcpkg-cache

      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics
          
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install Gettext (MSYS2)
        run: |
          & "C:\msys64\usr\bin\bash.exe" -lc "pacman -S --noconfirm mingw-w64-x86_64-gettext"
          echo "GETTEXT_MSGMERGE_EXECUTABLE=C:\msys64\mingw64\bin\msgmerge.exe" >> $env:GITHUB_ENV
          echo "GETTEXT_MSGFMT_EXECUTABLE=C:\msys64\mingw64\bin\msgfmt.exe" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 🔥 核心步骤：配置 CMake 触发 Manifest Mode 安装
      # 我们不在这里显式运行 "vcpkg install"，而是让 CMake 工具链文件自动处理
      - name: Configure CMake (Triggers Manifest Install)
        id: configure
        run: |
          $vcpkgRoot = "$env:GITHUB_WORKSPACE\vcpkg"
          $fontforgeDir = "$env:GITHUB_WORKSPACE\fontforge"
          $buildDir = "$fontforgeDir\build"
          $pythonExe = (Get-Command python).Source
          
          Write-Host "=== Starting CMake Configuration (Manifest Mode) ==="
          Write-Host "Source: $fontforgeDir"
          Write-Host "Build: $buildDir"
          
          # 第一次运行 CMake 会触发 vcpkg 安装依赖
          # 我们故意先让它失败，以便捕获 pkgconf 的路径，或者尝试直接配置
          # 但为了稳健，我们先手动触发一次 manifest 安装以确保包到位
          
          Write-Host "`n=== Pre-installing dependencies via Manifest Mode ==="
          & "$vcpkgRoot\vcpkg.exe" install `
            --x-manifest-root="$fontforgeDir" `
            --x-install-root="$fontforgeDir\build\vcpkg_installed" `
            --binarysource="files,$env:GITHUB_WORKSPACE\vcpkg-cache,readwrite"
          
          Write-Host "`n=== Locating pkgconf.exe ==="
          $installedDir = "$fontforgeDir\build\vcpkg_installed\x64-windows"
          $pkgconfExe = "$installedDir\tools\pkgconf\pkgconf.exe"
          
          if (-not (Test-Path $pkgconfExe)) {
            # 尝试递归查找
            $found = Get-ChildItem -Path "$fontforgeDir\build\vcpkg_installed" -Recurse -Filter "pkgconf.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $pkgconfExe = $found.FullName
              Write-Host "Found pkgconf.exe at: $pkgconfExe"
            } else {
              Write-Host "::error::pkgconf.exe not found in vcpkg installed directory!"
              exit 1
            }
          } else {
            Write-Host "Found pkgconf.exe at: $pkgconfExe"
          }
          
          # 🔥 关键修复：验证 pkgconf 是否能运行
          # 如果直接运行失败，通常是因为缺少 PATH 中的依赖 DLL
          $pkgconfDir = Split-Path $pkgconfExe -Parent
          $binDir = "$installedDir\bin"
          
          # 临时更新 PATH 以包含 pkgconf 目录和 bin 目录
          $oldPath = $env:PATH
          $env:PATH = "$pkgconfDir;$binDir;$env:PATH"
          
          Write-Host "`n=== Testing pkgconf execution ==="
          try {
            $version = & $pkgconfExe --version
            Write-Host "pkgconf version: $version"
            Write-Host "✓ pkgconf is executable!"
          } catch {
            Write-Host "::error::Failed to execute pkgconf.exe. Error: $_"
            Write-Host "Current PATH includes: $pkgconfDir"
            exit 1
          }
          
          # 恢复 PATH (稍后在 cmake 命令中会再次设置)
          $env:PATH = $oldPath
          
          # 保存变量供下一步使用
          $pkgconfExe | Out-File -FilePath "$env:GITHUB_WORKSPACE\pkgconf_path.txt" -Encoding UTF8
          $pkgconfDir | Out-File -FilePath "$env:GITHUB_WORKSPACE\pkgconf_dir.txt" -Encoding UTF8
          $binDir | Out-File -FilePath "$env:GITHUB_WORKSPACE\bin_dir.txt" -Encoding UTF8
          
          # 设置 PKG_CONFIG_PATH
          $pcPath = "$installedDir\lib\pkgconfig;$installedDir\share\pkgconfig"
          $pcPath | Out-File -FilePath "$env:GITHUB_WORKSPACE\pkgconfig_path.txt" -Encoding UTF8
          
          Write-Host "`n=== Running CMake Configure ==="
          cmake -S "$fontforgeDir" -B "$buildDir" `
            -G "Ninja" `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPython3_EXECUTABLE="$pythonExe" `
            -DENABLE_GUI=ON `
            -DENABLE_PYTHON_SCRIPTING=ON `
            -DENABLE_PYTHON_EXTENSION=ON `
            -DENABLE_LIBSPIRO=ON `
            -DENABLE_WOFF2=ON `
            -DENABLE_DOCS=OFF `
            -DENABLE_NLS=ON `
            -DBUILD_SHARED_LIBS=ON `
            -DUSE_GTK3=ON `
            -DPKG_CONFIG_EXECUTABLE="$pkgconfExe" `
            -DPKG_CONFIG_PATH="$pcPath" `
            -DGETTEXT_MSGMERGE_EXECUTABLE="$env:GETTEXT_MSGMERGE_EXECUTABLE" `
            -DGETTEXT_MSGFMT_EXECUTABLE="$env:GETTEXT_MSGFMT_EXECUTABLE" `
            -DVCPKG_INSTALLED_DIR="$fontforgeDir\build\vcpkg_installed"
            
        shell: pwsh

      - name: Build FontForge
        run: |
          # 构建时需要确保 PATH 包含 pkgconf 依赖
          $pkgconfDir = Get-Content "$env:GITHUB_WORKSPACE\pkgconf_dir.txt"
          $binDir = Get-Content "$env:GITHUB_WORKSPACE\bin_dir.txt"
          $env:PATH = "$pkgconfDir;$binDir;$env:PATH"
          
          cmake --build fontforge/build --config Release
        shell: pwsh
        working-directory: .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FontForge-Windows-MSVC-Manifest
          path: |
            fontforge/build/bin/
            fontforge/build/share/
          if-no-files-found: error
          retention-days: 30

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
