name: Build FontForge with MSVC for Windows
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows-msvc:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
    steps:
      # 🔥 关键修改：拉取 官方FontForge 源码（你的仓库不用放源码）
      - name: Checkout FontForge official source
        uses: actions/checkout@v4
        with:
          repository: fontforge/fontforge
          ref: master
          path: fontforge

      # 恢复 vcpkg 缓存
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
          restore-keys: |
            vcpkg-files-${{ runner.os }}-

      - name: Create vcpkg cache directory
        run: New-Item -ItemType Directory -Force -Path vcpkg-cache

      # 配置 vcpkg（官方源码路径）
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'fontforge/vcpkg.json'
          vcpkgTriplet: 'x64-windows'

      # 🔥 关键：手动安装 pkgconf 和 gettext 工具
      - name: Manually Install Tools via vcpkg
        run: |
         vcpkg install pkgconf:x64-windows gettext:x64-windows glib:x64-windows libspiro:x64-windows freetype:x64-windows libxml2:x64-windows libpng:x64-windows giflib:x64-windows libjpeg-turbo:x64-windows tiff:x64-windows cairo:x64-windows pango:x64-windows harfbuzz:x64-windows woff2:x64-windows


      # 初始化 MSVC x64 环境
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 配置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Inject All Dependencies Manually
        run: |
          cd fontforge
          
          # 1. 准备路径
          $vcpkg = $env:VCPKG_ROOT -replace '\\', '/'
          $inst = "$vcpkg/installed/x64-windows"
          
          # 2. 替换 FindGLIB.cmake
          $newFindGLIB = @"
          # THIS FILE IS REPLACED BY CI
          set(GLIB_INCLUDE_DIRS "$inst/include/glib-2.0;$inst/lib/glib-2.0/include" CACHE PATH "" FORCE)
          set(GLIB_LIBRARIES "$inst/lib/glib-2.0.lib" CACHE FILEPATH "" FORCE)
          set(GLIB_GIO_LIBRARIES "$inst/lib/gio-2.0.lib" CACHE FILEPATH "" FORCE)
          set(GLIB_GOBJECT_LIBRARIES "$inst/lib/gobject-2.0.lib" CACHE FILEPATH "" FORCE)
          set(GLIB_VERSION "2.76.0" CACHE STRING "" FORCE)
          set(GLIB_VERSION_OK TRUE CACHE BOOL "" FORCE)
          set(GLIB_FOUND TRUE CACHE BOOL "" FORCE)
          if(NOT TARGET GLIB2::GLIB2)
            add_library(GLIB2::GLIB2 UNKNOWN IMPORTED)
            set_target_properties(GLIB2::GLIB2 PROPERTIES IMPORTED_LOCATION "$inst/lib/glib-2.0.lib" INTERFACE_INCLUDE_DIRECTORIES "$inst/include/glib-2.0;$inst/lib/glib-2.0/include")
          endif()
          if(NOT TARGET GLIB2::GIO)
            add_library(GLIB2::GIO UNKNOWN IMPORTED)
            set_target_properties(GLIB2::GIO PROPERTIES IMPORTED_LOCATION "$inst/lib/gio-2.0.lib" INTERFACE_INCLUDE_DIRECTORIES "$inst/include/glib-2.0;$inst/lib/glib-2.0/include")
          endif()
          if(NOT TARGET GLIB2::GOBJECT)
            add_library(GLIB2::GOBJECT UNKNOWN IMPORTED)
            set_target_properties(GLIB2::GOBJECT PROPERTIES IMPORTED_LOCATION "$inst/lib/gobject-2.0.lib" INTERFACE_INCLUDE_DIRECTORIES "$inst/include/glib-2.0;$inst/lib/glib-2.0/include")
          endif()
          "@
          $newFindGLIB | Set-Content "cmake/packages/FindGLIB.cmake"
          
          # 3. 处理主 CMakeLists.txt
          $cmakeContent = Get-Content "CMakeLists.txt" -Raw
          $cmakeContent = $cmakeContent -replace 'find_package\(PkgConfig[^\)]*\)', ''
          $cmakeContent = $cmakeContent -replace 'pkg_check_modules\(', '# pkg_check_modules('
          
          # 4. 🔥 注入所有可能的依赖库路径
          $hardcode = @"
          # =============== INJECTED BY CI ===============
          # Basic setup
          set(CMAKE_PREFIX_PATH "$inst" CACHE PATH "" FORCE)
          
          # Intl / Gettext
          set(Intl_INCLUDE_DIR "$inst/include" CACHE PATH "" FORCE)
          set(Intl_LIBRARY "$inst/lib/intl.lib" CACHE FILEPATH "" FORCE)
          set(Intl_FOUND TRUE CACHE BOOL "" FORCE)
          set(GETTEXT_MSGMERGE_EXECUTABLE "$inst/tools/gettext/bin/msgmerge.exe" CACHE FILEPATH "" FORCE)
          set(GETTEXT_MSGFMT_EXECUTABLE "$inst/tools/gettext/bin/msgfmt.exe" CACHE FILEPATH "" FORCE)
          
          # Libspiro (Current Blocker)
          set(Libspiro_INCLUDE_DIRS "$inst/include" CACHE PATH "" FORCE)
          set(Libspiro_LIBRARIES "$inst/lib/libspiro.lib" CACHE FILEPATH "" FORCE)
          set(Libspiro_FOUND TRUE CACHE BOOL "" FORCE)
          
          # Freetype
          set(Freetype_INCLUDE_DIRS "$inst/include/freetype2" CACHE PATH "" FORCE)
          set(Freetype_LIBRARIES "$inst/lib/freetype.lib" CACHE FILEPATH "" FORCE)
          set(Freetype_FOUND TRUE CACHE BOOL "" FORCE)
          
          # LibXML2
          set(LibXml2_INCLUDE_DIRS "$inst/include/libxml2" CACHE PATH "" FORCE)
          set(LibXml2_LIBRARIES "$inst/lib/libxml2.lib" CACHE FILEPATH "" FORCE)
          set(LibXml2_FOUND TRUE CACHE BOOL "" FORCE)
          
          # GIF, JPEG, PNG, TIFF
          set(GIF_INCLUDE_DIRS "$inst/include" CACHE PATH "" FORCE)
          set(GIF_LIBRARIES "$inst/lib/gif.lib" CACHE FILEPATH "" FORCE)
          set(GIF_FOUND TRUE CACHE BOOL "" FORCE)
          
          set(JPEG_INCLUDE_DIRS "$inst/include" CACHE PATH "" FORCE)
          set(JPEG_LIBRARIES "$inst/lib/jpeg.lib" CACHE FILEPATH "" FORCE)
          set(JPEG_FOUND TRUE CACHE BOOL "" FORCE)
          
          set(PNG_INCLUDE_DIRS "$inst/include" CACHE PATH "" FORCE)
          set(PNG_LIBRARIES "$inst/lib/libpng16.lib" CACHE FILEPATH "" FORCE)
          set(PNG_FOUND TRUE CACHE BOOL "" FORCE)
          
          set(TIFF_INCLUDE_DIRS "$inst/include" CACHE PATH "" FORCE)
          set(TIFF_LIBRARIES "$inst/lib/tiff.lib" CACHE FILEPATH "" FORCE)
          set(TIFF_FOUND TRUE CACHE BOOL "" FORCE)
          
          # Cairo, Pango, Harfbuzz (for GUI)
          set(CAIRO_INCLUDE_DIRS "$inst/include/cairo" CACHE PATH "" FORCE)
          set(CAIRO_LIBRARIES "$inst/lib/cairo.lib" CACHE FILEPATH "" FORCE)
          set(CAIRO_FOUND TRUE CACHE BOOL "" FORCE)
          
          # Harfbuzz
          set(HARFBUZZ_INCLUDE_DIRS "$inst/include/harfbuzz" CACHE PATH "" FORCE)
          set(HARFBUZZ_LIBRARIES "$inst/lib/harfbuzz.lib" CACHE FILEPATH "" FORCE)
          set(HARFBUZZ_FOUND TRUE CACHE BOOL "" FORCE)
          
          # Pango
          set(Pango_INCLUDE_DIRS "$inst/include/pango-1.0" CACHE PATH "" FORCE)
          set(Pango_LIBRARIES "$inst/lib/pango-1.0.lib;$inst/lib/pangowin32-1.0.lib;$inst/lib/pangocairo-1.0.lib" CACHE FILEPATH "" FORCE)
          set(Pango_FOUND TRUE CACHE BOOL "" FORCE)
          
          # WOFF2
          set(WOFF2_INCLUDE_DIRS "$inst/include" CACHE PATH "" FORCE)
          set(WOFF2_LIBRARIES "$inst/lib/woff2enc.lib;$inst/lib/woff2common.lib;$inst/lib/brotlienc.lib" CACHE FILEPATH "" FORCE)
          set(WOFF2_FOUND TRUE CACHE BOOL "" FORCE)
          # =============== END INJECTION ===============
          
          "@
          
          $hardcode + $cmakeContent | Set-Content "CMakeLists.txt"
          
          Write-Host "Injected paths for all known dependencies."

      # 进入源码目录编译（核心！）
      - name: Configure CMake
        run: |
          cd fontforge
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          $pythonExe = (Get-Command python).Source
          
          # 🔥 关键：设置 PKG_CONFIG_PATH 环境变量，让 FindGLIB 通过 pkgconf 找路径
          $env:PKG_CONFIG_PATH = "$vcpkgInstalled/lib/pkgconfig"
          cmake -B build -G "NMake Makefiles" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPython3_EXECUTABLE="$pythonExe" `
            -DENABLE_GUI=ON `
            -DENABLE_PYTHON_SCRIPTING=ON `
            -DENABLE_PYTHON_EXTENSION=ON `
            -DENABLE_LIBSPIRO=ON `
            -DENABLE_WOFF2=ON `
            -DENABLE_DOCS=OFF `
            -DBUILD_SHARED_LIBS=ON

      - name: Build FontForge
        run: |
          cd fontforge
          cmake --build build

      - name: Run pyhook tests
        run: |
          cd fontforge
          Copy-Item build/bin/*.dll build/lib/ -Force
          Copy-Item build/vcpkg_installed/x64-windows/bin/*.dll build/lib/ -Force -ErrorAction SilentlyContinue
          ctest --test-dir build -R "_pyhook" --output-on-failure
      
      - name: Download and configure embedded Python 3.14.3
        run: |
          cd fontforge
          # 创建Lib目录
          New-Item -ItemType Directory -Force -Path build/bin/Lib
          # 下载Python嵌入式包
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.14.3/python-3.14.3-embed-amd64.zip" -OutFile python-embed.zip
          # 解压到 bin/Lib
          Expand-Archive -Path python-embed.zip -DestinationPath build/bin/Lib -Force
          # 删除压缩包
          Remove-Item -Path python-embed.zip -Force
          # 移动 python314.dll 到 bin 目录
          Move-Item -Path build/bin/Lib/python314.dll -Destination build/bin/ -Force -ErrorAction SilentlyContinue
          # 移动 python314.zip 到 bin 目录
          Move-Item -Path build/bin/Lib/python314.zip -Destination build/bin/ -Force -ErrorAction SilentlyContinue
        
      - name: Upload FontForge Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          # 下载时显示的名字
          name: FontForge-Windows-MSVC-Build
          # 上传编译好的所有 exe/dll 文件
          path: 
              fontforge/build/bin/
          if-no-files-found: error

      # 保存缓存
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
