name: Build FontForge with MSVC for Windows
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows-msvc:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
    steps:
      # 🔥 关键修改：拉取 官方FontForge 源码（你的仓库不用放源码）
      - name: Checkout FontForge official source
        uses: actions/checkout@v4
        with:
          repository: fontforge/fontforge
          ref: master
          path: fontforge

      # 恢复 vcpkg 缓存
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
          restore-keys: |
            vcpkg-files-${{ runner.os }}-

      - name: Create vcpkg cache directory
        run: New-Item -ItemType Directory -Force -Path vcpkg-cache

      # 配置 vcpkg（官方源码路径）
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'fontforge/vcpkg.json'

      # 初始化 MSVC x64 环境
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 配置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 进入源码目录编译（核心！）
      - name: Configure CMake
        run: |
          cd fontforge
          $pythonExe = (Get-Command python).Source
          cmake -B build -G "NMake Makefiles" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPython3_EXECUTABLE="$pythonExe" `
            -DENABLE_GUI=OFF `
            -DENABLE_PYTHON_SCRIPTING=ON `
            -DENABLE_PYTHON_EXTENSION=ON `
            -DENABLE_LIBSPIRO=OFF `
            -DENABLE_WOFF2=OFF `
            -DENABLE_DOCS=OFF `
            -DBUILD_SHARED_LIBS=ON

      - name: Build FontForge
        run: |
          cd fontforge
          cmake --build build

      - name: Run pyhook tests
        run: |
          cd fontforge
          Copy-Item build\bin\*.dll build\lib\ -Force
          Copy-Item build\vcpkg_installed\x64-windows\bin\*.dll build\lib\ -Force -ErrorAction SilentlyContinue
          ctest --test-dir build -R "_pyhook" --output-on-failure

      - name: Upload FontForge Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          # 下载时显示的名字
          name: FontForge-Windows-MSVC-Build
          # 上传编译好的所有 exe/dll 文件
          path: 
              fontforge/build/
          if-no-files-found: error

      # 保存缓存
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
